<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אזור המורה</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-4">
    <h2 class="mb-4">אזור המורה</h2>

    <section class="stats-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">
      <div class="stat-box"><span>מבחנים שיצרתי</span><strong id="totalExams">0</strong></div>
    </section>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card">
          <div class="card-header bg-primary text-white">יצירת מבחן</div>
          <div class="card-body">
            <div class="mb-3"><label class="form-label">שם המבחן</label><input id="examTitle" class="form-control"></div>
            <div class="mb-3"><label class="form-label">תיאור</label><textarea id="examDescription" class="form-control" rows="3"></textarea></div>
            <div class="mb-3"><label class="form-label">קטגוריה</label><input id="examCategory" class="form-control" placeholder="למשל Java"></div>
            <div class="mb-3"><label class="form-label">משך בדקות</label><input id="examDuration" type="number" min="1" value="10" class="form-control"></div>
            <button id="createExamBtn" class="btn btn-primary w-100">צור מבחן</button>
            <div id="createMessage" class="mt-3"></div>
            <hr>
            <label class="form-label">ייבוא מבחן מקובץ JSON</label>
            <input type="file" id="importFile" accept="application/json" class="form-control">
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="card">
          <div class="card-header bg-dark text-white">המבחנים שלי</div>
          <div class="card-body"><div id="examList"></div></div>
        </div>
      </div>
    </div>

    <div class="card mt-4">
      <div class="card-header bg-dark text-white">ממוצע לכל מבחן</div>
      <div class="card-body"><div id="chart"></div></div>
    </div>
  </main>
  <script type="module" src="js/pages/teacherPage.js"></script>
</body>
</html>
