<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar"></div>

  <div class="container py-5">
    <div class="card mx-auto" style="max-width: 480px;">
      <div class="card-header bg-primary text-white">הרשמה למערכת</div>
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label">שם מלא</label>
          <input id="fullName" type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">שם משתמש</label>
          <input id="username" type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">סיסמה</label>
          <input id="password" type="password" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">סוג משתמש</label>
          <select id="role" class="form-select">
            <option value="">בחרו סוג משתמש</option>
            <option value="student">סטודנט</option>
            <option value="teacher">מורה</option>
          </select>
        </div>

        <button id="registerBtn" class="btn btn-primary w-100">הרשמה</button>

        <div id="message" class="mt-3"></div>

        <p class="mt-3 text-center small-muted">
          כבר יש לכם חשבון? <a href="login.html">התחברות</a>
        </p>

      </div>
    </div>
  </div>

  <script type="module" src="js/pages/registerPage.js"></script>
</body>
</html>
