<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרטי מבחן</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar"></div>

  <div class="container py-4">

    <!-- dashboard on top -->
    <section class="stats-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">
      <div class="stat-box"><span>ממוצע המבחן</span><strong id="examAvg">0%</strong></div>
      <div class="stat-box"><span>נבחנים</span><strong id="examCount">0</strong></div>
    </section>

    

     <div class="card mb-4">
      <div class="card-header bg-primary text-white">מידע כללי</div>
      <div class="card-body" id="examInfo">
       </div>
    </div>

    <div class="row">

       <div class="col-md-5">
        <div class="card mb-4">
          <div class="card-header bg-success text-white">הוספת שאלה</div>
          <div class="card-body">

            <div class="mb-3">
              <label class="form-label">טקסט השאלה</label>
              <input id="questionText" type="text" class="form-control">
            </div>

            <div class="mb-2">
              <label class="form-label">תשובה 1</label>
              <input id="answer1" type="text" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label">תשובה 2</label>
              <input id="answer2" type="text" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label">תשובה 3</label>
              <input id="answer3" type="text" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label">תשובה 4</label>
              <input id="answer4" type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">מספר התשובה הנכונה (1-4)</label>
              <input id="correctAnswer" type="number" class="form-control" min="1" max="4">
            </div>

            <div class="mb-3">
              <label class="form-label">רמת קושי</label>
              <select id="difficulty" class="form-select">
                <option value="easy">קל</option>
                <option value="medium" selected>בינוני</option>
                <option value="hard">קשה</option>
              </select>
            </div>

            <button id="addQuestionBtn" class="btn btn-success w-100">הוספת שאלה</button>
            <div id="questionMessage" class="mt-3"></div>
          </div>
        </div>
      </div>

       <div class="col-md-7">
        <div class="card mb-4">
          <div class="card-header bg-dark text-white">שאלות המבחן</div>
          <div class="card-body">
            <div id="questionList"></div>
          </div>
        </div>

         <div class="card">
          <div class="card-header bg-warning">תוצאות תלמידים</div>
          <div class="card-body">
            <div id="resultsList"></div>
          </div>
        </div>
      </div>

    </div>

    <div class="card mb-4">
      <div class="card-header bg-dark text-white">נקודות התלמידים</div>
      <div class="card-body"><div id="chart"></div></div>
    </div>
    
    <a href="teacher.html" class="btn btn-secondary mt-3">חזרה לאזור המורה</a>
    <button id="exportBtn" class="btn btn-outline-primary mt-3">ייצוא לקובץ JSON</button>
  </div>

  <script type="module" src="js/pages/examDetailsPage.js"></script>
</body>
</html>
