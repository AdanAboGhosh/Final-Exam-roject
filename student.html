<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אזור הסטודנט</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h2>אזור הסטודנט</h2>
      <a href="search.html" class="btn btn-success">חיפוש מבחן</a>
    </div>
    <section class="stats-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">
      <div class="stat-box"><span>ממוצע</span><strong id="average">0%</strong></div>
      <div class="stat-box"><span>מבחנים שבוצעו</span><strong id="doneCount">0</strong></div>
    </section>
    <div class="card mb-4">
      <div class="card-header bg-dark text-white">גרף ציונים</div>
      <div class="card-body"><div id="chart"></div></div>
    </div>
    <div class="card">
      <div class="card-header bg-dark text-white">היסטוריית ציונים</div>
      <div class="card-body"><div id="historyList"></div></div>
    </div>
  </main>
  <script type="module" src="js/pages/studentPage.js"></script>
</body>
</html>
